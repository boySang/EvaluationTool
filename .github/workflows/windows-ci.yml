name: Windows CI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: '1'
  DOTNET_NOLOGO: '1'
  NUGET_PACKAGES: ${{ github.workspace }}\.nuget\packages

jobs:
  build-test:
    name: Build and test (Windows x64)
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.4xx'
          dotnet-quality: 'ga'
          architecture: x64

      - name: Cache NuGet global packages
        uses: actions/cache@v5
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ runner.os }}-dotnet-8.0.4xx-${{ hashFiles('**/*.csproj', 'Directory.Build.props', 'NuGet.config', 'nuget.config', 'global.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-dotnet-8.0.4xx-

      - name: Restore solution
        run: dotnet restore AssessmentTool.sln --nologo

      - name: Test Core (net8.0)
        run: >-
          dotnet test tests/AssessmentTool.Core.Tests/AssessmentTool.Core.Tests.csproj
          --configuration Release
          --framework net8.0
          --no-restore
          --logger "trx;LogFileName=core-net8.trx"
          --logger "console;verbosity=normal"
          --results-directory artifacts\test-results\core-net8

      - name: Test Windows platform services (net48, x64)
        run: >-
          dotnet test tests/AssessmentTool.Windows.Tests/AssessmentTool.Windows.Tests.csproj
          --configuration Release
          --framework net48
          --no-restore
          --logger "trx;LogFileName=windows-net48-sqlite.trx"
          --logger "console;verbosity=normal"
          --results-directory artifacts\test-results\windows-net48

      - name: Publish failed test details
        if: ${{ failure() }}
        run: |
          $trxFiles = Get-ChildItem -Path 'artifacts\test-results' -Filter '*.trx' -Recurse -ErrorAction SilentlyContinue
          foreach ($trxFile in $trxFiles) {
            [xml]$trx = Get-Content -Path $trxFile.FullName -Raw
            $namespace = New-Object System.Xml.XmlNamespaceManager($trx.NameTable)
            $namespace.AddNamespace('t', $trx.DocumentElement.NamespaceURI)
            $failedResults = $trx.SelectNodes("//t:UnitTestResult[@outcome='Failed']", $namespace)

            foreach ($failedResult in $failedResults) {
              $testName = [string]$failedResult.GetAttribute('testName')
              $messageNode = $failedResult.SelectSingleNode('t:Output/t:ErrorInfo/t:Message', $namespace)
              $message = if ($null -eq $messageNode) { 'No assertion message was recorded.' } else { $messageNode.InnerText }
              $detail = "$testName - $message"
              $escaped = $detail.Replace('%', '%25').Replace("`r", '%0D').Replace("`n", '%0A')
              Write-Output "::error title=Windows test failed::$escaped"
              Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- ``$testName``: $message"
            }
          }

      - name: Build solution (Release x64)
        run: >-
          dotnet build AssessmentTool.sln
          --configuration Release
          --no-restore
          --nologo
          -p:PlatformTarget=x64

      - name: Verify application x64 output
        run: |
          $appExecutable = Get-ChildItem -Path 'src\AssessmentTool.App\bin\Release' `
            -Filter 'AssessmentTool.App.exe' -Recurse

          if ($appExecutable.Count -ne 1) {
            throw 'Release output must contain exactly one AssessmentTool.App.exe.'
          }

          $nativeSqlite = Join-Path $appExecutable[0].DirectoryName 'x64\SQLite.Interop.dll'
          if (-not (Test-Path $nativeSqlite)) {
            throw 'Application output does not contain x64\SQLite.Interop.dll.'
          }

      - name: Collect copyable Release outputs
        run: |
          $artifactRoot = Join-Path $PWD 'artifacts\release\EvaluationTool'
          New-Item -ItemType Directory -Path $artifactRoot -Force | Out-Null

          $appExecutable = Get-ChildItem -Path 'src\AssessmentTool.App\bin\Release' `
            -Filter 'AssessmentTool.App.exe' -Recurse
          if ($appExecutable.Count -ne 1) {
            throw 'Cannot collect application output because the executable is missing or ambiguous.'
          }

          Copy-Item -Path (Join-Path $appExecutable[0].DirectoryName '*') `
            -Destination $artifactRoot -Recurse -Force

      - name: Verify and bundle trusted Plink
        run: |
          $plinkUrl = 'https://the.earth.li/~sgtatham/putty/0.84/w64/plink.exe'
          $expectedHash = 'e5621ffe4879f0ec39ed40f688db9399c2d43054d41ef14472fa335c4693b915'
          $expectedVersion = '0.84.0.0'
          $expectedSignerName = 'Simon Tatham'
          $expectedSignerThumbprint = '66C298D018034F29B8EA1D6E90F5497FE305D2E8'
          $expectedSignerSerialNumber = '00BE8E1D85C5D2521B6D33379E3B8501A9'
          $downloadDirectory = Join-Path $env:RUNNER_TEMP 'EvaluationTool\putty-0.84'
          $downloadPath = Join-Path $downloadDirectory 'plink.exe'

          Remove-Item -Path $downloadDirectory -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $downloadDirectory -Force | Out-Null
          Invoke-WebRequest -Uri $plinkUrl -OutFile $downloadPath

          $actualHash = (Get-FileHash -Path $downloadPath -Algorithm SHA256).Hash
          if (-not [string]::Equals($actualHash, $expectedHash, [System.StringComparison]::OrdinalIgnoreCase)) {
            throw "Plink SHA-256 mismatch. Expected $expectedHash but received $actualHash."
          }

          $signature = Get-AuthenticodeSignature -FilePath $downloadPath
          if ($signature.Status -ne [System.Management.Automation.SignatureStatus]::Valid) {
            throw "Plink Authenticode signature is not valid: $($signature.Status)."
          }

          $signerCertificate = $signature.SignerCertificate
          if ($null -eq $signerCertificate) {
            throw 'Plink Authenticode signature does not contain a signer certificate.'
          }

          $signerName = $signerCertificate.GetNameInfo(
            [System.Security.Cryptography.X509Certificates.X509NameType]::SimpleName,
            $false)
          if ([string]::IsNullOrWhiteSpace($signerName) -or
              -not [string]::Equals($signerName, $expectedSignerName, [System.StringComparison]::Ordinal)) {
            throw "Plink signer name mismatch. Expected $expectedSignerName but received $signerName."
          }

          $signerThumbprint = $signerCertificate.Thumbprint
          if ([string]::IsNullOrWhiteSpace($signerThumbprint)) {
            throw 'Plink signer certificate thumbprint is empty.'
          }

          $normalizedSignerThumbprint = $signerThumbprint.Replace(' ', '')
          if (-not [string]::Equals(
              $normalizedSignerThumbprint,
              $expectedSignerThumbprint,
              [System.StringComparison]::OrdinalIgnoreCase)) {
            throw "Plink signer certificate thumbprint mismatch. Expected $expectedSignerThumbprint but received $normalizedSignerThumbprint."
          }

          $signerSerialNumber = $signerCertificate.SerialNumber
          if ([string]::IsNullOrWhiteSpace($signerSerialNumber) -or
              -not [string]::Equals(
                $signerSerialNumber,
                $expectedSignerSerialNumber,
                [System.StringComparison]::OrdinalIgnoreCase)) {
            throw "Plink signer certificate serial number mismatch. Expected $expectedSignerSerialNumber but received $signerSerialNumber."
          }

          $versionInfo = [System.Diagnostics.FileVersionInfo]::GetVersionInfo($downloadPath)
          $actualVersion = '{0}.{1}.{2}.{3}' -f `
            $versionInfo.FileMajorPart,
            $versionInfo.FileMinorPart,
            $versionInfo.FileBuildPart,
            $versionInfo.FilePrivatePart
          if (-not [string]::Equals($actualVersion, $expectedVersion, [System.StringComparison]::Ordinal)) {
            throw "Plink file version mismatch. Expected $expectedVersion but received $actualVersion."
          }

          $componentDirectory = Join-Path $PWD 'artifacts\release\EvaluationTool\依赖组件'
          New-Item -ItemType Directory -Path $componentDirectory -Force | Out-Null
          Copy-Item -Path $downloadPath -Destination (Join-Path $componentDirectory 'plink.exe') -Force

      - name: Smoke test packaged application startup
        run: |
          $releaseDirectory = Join-Path $PWD 'artifacts\release\EvaluationTool'
          $appPath = Join-Path $releaseDirectory 'AssessmentTool.App.exe'
          if (-not (Test-Path -LiteralPath $appPath -PathType Leaf)) {
            throw "Packaged application is missing: $appPath"
          }

          function Test-PackagedApplicationStartup([string] $description) {
            $startedAt = Get-Date
            $process = Start-Process `
              -FilePath $appPath `
              -WorkingDirectory $releaseDirectory `
              -PassThru `
              -ErrorAction Stop
            try {
              if ($process.WaitForExit(10000)) {
                $exitCode = $process.ExitCode
                Start-Sleep -Seconds 2
                Get-WinEvent -FilterHashtable @{
                  LogName = 'Application'
                  StartTime = $startedAt.AddSeconds(-1)
                } -ErrorAction SilentlyContinue |
                  Where-Object { $_.ProviderName -in @('.NET Runtime', 'Application Error', 'Windows Error Reporting') } |
                  Select-Object -First 10 TimeCreated, ProviderName, Id, LevelDisplayName, Message |
                  Format-List
                throw "$description exited during startup with code $exitCode."
              }

              Write-Host "$description remained running for 10 seconds."
            }
            finally {
              $process.Refresh()
              if (-not $process.HasExited) {
                Stop-Process -Id $process.Id -Force
                if (-not $process.WaitForExit(5000)) {
                  throw "$description could not be terminated within 5 seconds."
                }
              }
              $process.Dispose()
            }
          }

          Test-PackagedApplicationStartup 'First packaged startup'
          Test-PackagedApplicationStartup 'Second packaged startup with existing local data'

      - name: Upload test results
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: EvaluationTool-test-results-windows
          path: artifacts\test-results
          if-no-files-found: warn
          retention-days: 14

      - name: Upload copyable Release build
        uses: actions/upload-artifact@v6
        with:
          name: EvaluationTool-Release-windows-x64
          path: artifacts\release\EvaluationTool
          if-no-files-found: error
          retention-days: 14
