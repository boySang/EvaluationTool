name: Windows CI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: '1'
  DOTNET_NOLOGO: '1'
  NUGET_PACKAGES: ${{ github.workspace }}\.nuget\packages

jobs:
  build-test:
    name: Build and test (Windows x64)
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.4xx'
          dotnet-quality: 'ga'
          architecture: x64

      - name: Cache NuGet global packages
        uses: actions/cache@v5
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ runner.os }}-dotnet-8.0.4xx-${{ hashFiles('**/*.csproj', 'Directory.Build.props', 'NuGet.config', 'nuget.config', 'global.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-dotnet-8.0.4xx-

      - name: Restore solution
        run: dotnet restore AssessmentTool.sln --nologo

      - name: Test Core (net8.0)
        run: >-
          dotnet test tests/AssessmentTool.Core.Tests/AssessmentTool.Core.Tests.csproj
          --configuration Release
          --framework net8.0
          --no-restore
          --logger "trx;LogFileName=core-net8.trx"
          --logger "console;verbosity=normal"
          --results-directory artifacts\test-results\core-net8

      - name: Test Windows platform services (net48, x64)
        run: >-
          dotnet test tests/AssessmentTool.Windows.Tests/AssessmentTool.Windows.Tests.csproj
          --configuration Release
          --framework net48
          --no-restore
          --logger "trx;LogFileName=windows-net48-sqlite.trx"
          --logger "console;verbosity=normal"
          --results-directory artifacts\test-results\windows-net48

      - name: Publish failed test details
        if: ${{ failure() }}
        run: |
          $trxFiles = Get-ChildItem -Path 'artifacts\test-results' -Filter '*.trx' -Recurse -ErrorAction SilentlyContinue
          foreach ($trxFile in $trxFiles) {
            [xml]$trx = Get-Content -Path $trxFile.FullName -Raw
            $namespace = New-Object System.Xml.XmlNamespaceManager($trx.NameTable)
            $namespace.AddNamespace('t', $trx.DocumentElement.NamespaceURI)
            $failedResults = $trx.SelectNodes("//t:UnitTestResult[@outcome='Failed']", $namespace)

            foreach ($failedResult in $failedResults) {
              $testName = [string]$failedResult.GetAttribute('testName')
              $messageNode = $failedResult.SelectSingleNode('t:Output/t:ErrorInfo/t:Message', $namespace)
              $message = if ($null -eq $messageNode) { 'No assertion message was recorded.' } else { $messageNode.InnerText }
              $detail = "$testName - $message"
              $escaped = $detail.Replace('%', '%25').Replace("`r", '%0D').Replace("`n", '%0A')
              Write-Output "::error title=Windows test failed::$escaped"
              Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- ``$testName``: $message"
            }
          }

      - name: Build solution (Release x64)
        run: >-
          dotnet build AssessmentTool.sln
          --configuration Release
          --no-restore
          --nologo
          -p:PlatformTarget=x64

      - name: Verify application x64 output
        run: |
          $appExecutable = Get-ChildItem -Path 'src\AssessmentTool.App\bin\Release' `
            -Filter 'AssessmentTool.App.exe' -Recurse

          if ($appExecutable.Count -ne 1) {
            throw 'Release output must contain exactly one AssessmentTool.App.exe.'
          }

          $nativeSqlite = Join-Path $appExecutable[0].DirectoryName 'x64\SQLite.Interop.dll'
          if (-not (Test-Path $nativeSqlite)) {
            throw 'Application output does not contain x64\SQLite.Interop.dll.'
          }

      - name: Collect copyable Release outputs
        run: |
          $artifactRoot = Join-Path $PWD 'artifacts\release\EvaluationTool'
          New-Item -ItemType Directory -Path $artifactRoot -Force | Out-Null

          $appExecutable = Get-ChildItem -Path 'src\AssessmentTool.App\bin\Release' `
            -Filter 'AssessmentTool.App.exe' -Recurse
          if ($appExecutable.Count -ne 1) {
            throw 'Cannot collect application output because the executable is missing or ambiguous.'
          }

          Copy-Item -Path (Join-Path $appExecutable[0].DirectoryName '*') `
            -Destination $artifactRoot -Recurse -Force

      - name: Verify and bundle trusted Plink
        run: |
          $plinkUrl = 'https://the.earth.li/~sgtatham/putty/0.84/w64/plink.exe'
          $expectedHash = 'e5621ffe4879f0ec39ed40f688db9399c2d43054d41ef14472fa335c4693b915'
          $expectedVersion = '0.84.0.0'
          $expectedSignerName = 'Simon Tatham'
          $expectedSignerThumbprint = '66C298D018034F29B8EA1D6E90F5497FE305D2E8'
          $expectedSignerSerialNumber = '00BE8E1D85C5D2521B6D33379E3B8501A9'
          $downloadDirectory = Join-Path $env:RUNNER_TEMP 'EvaluationTool\putty-0.84'
          $downloadPath = Join-Path $downloadDirectory 'plink.exe'

          Remove-Item -Path $downloadDirectory -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $downloadDirectory -Force | Out-Null
          Invoke-WebRequest -Uri $plinkUrl -OutFile $downloadPath

          $actualHash = (Get-FileHash -Path $downloadPath -Algorithm SHA256).Hash
          if (-not [string]::Equals($actualHash, $expectedHash, [System.StringComparison]::OrdinalIgnoreCase)) {
            throw "Plink SHA-256 mismatch. Expected $expectedHash but received $actualHash."
          }

          $signature = Get-AuthenticodeSignature -FilePath $downloadPath
          if ($signature.Status -ne [System.Management.Automation.SignatureStatus]::Valid) {
            throw "Plink Authenticode signature is not valid: $($signature.Status)."
          }

          $signerCertificate = $signature.SignerCertificate
          if ($null -eq $signerCertificate) {
            throw 'Plink Authenticode signature does not contain a signer certificate.'
          }

          $signerName = $signerCertificate.GetNameInfo(
            [System.Security.Cryptography.X509Certificates.X509NameType]::SimpleName,
            $false)
          if ([string]::IsNullOrWhiteSpace($signerName) -or
              -not [string]::Equals($signerName, $expectedSignerName, [System.StringComparison]::Ordinal)) {
            throw "Plink signer name mismatch. Expected $expectedSignerName but received $signerName."
          }

          $signerThumbprint = $signerCertificate.Thumbprint
          if ([string]::IsNullOrWhiteSpace($signerThumbprint)) {
            throw 'Plink signer certificate thumbprint is empty.'
          }

          $normalizedSignerThumbprint = $signerThumbprint.Replace(' ', '')
          if (-not [string]::Equals(
              $normalizedSignerThumbprint,
              $expectedSignerThumbprint,
              [System.StringComparison]::OrdinalIgnoreCase)) {
            throw "Plink signer certificate thumbprint mismatch. Expected $expectedSignerThumbprint but received $normalizedSignerThumbprint."
          }

          $signerSerialNumber = $signerCertificate.SerialNumber
          if ([string]::IsNullOrWhiteSpace($signerSerialNumber) -or
              -not [string]::Equals(
                $signerSerialNumber,
                $expectedSignerSerialNumber,
                [System.StringComparison]::OrdinalIgnoreCase)) {
            throw "Plink signer certificate serial number mismatch. Expected $expectedSignerSerialNumber but received $signerSerialNumber."
          }

          $versionInfo = [System.Diagnostics.FileVersionInfo]::GetVersionInfo($downloadPath)
          $actualVersion = '{0}.{1}.{2}.{3}' -f `
            $versionInfo.FileMajorPart,
            $versionInfo.FileMinorPart,
            $versionInfo.FileBuildPart,
            $versionInfo.FilePrivatePart
          if (-not [string]::Equals($actualVersion, $expectedVersion, [System.StringComparison]::Ordinal)) {
            throw "Plink file version mismatch. Expected $expectedVersion but received $actualVersion."
          }

          $componentDirectory = Join-Path $PWD 'artifacts\release\EvaluationTool\依赖组件'
          New-Item -ItemType Directory -Path $componentDirectory -Force | Out-Null
          Copy-Item -Path $downloadPath -Destination (Join-Path $componentDirectory 'plink.exe') -Force

      - name: Build and test native startup checker
        run: |
          $vswhere = Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio\Installer\vswhere.exe'
          if (-not (Test-Path -LiteralPath $vswhere -PathType Leaf)) {
            throw 'Visual Studio locator is unavailable on the Windows runner.'
          }
          $vsPath = & $vswhere -latest -products * `
            -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 `
            -property installationPath
          if ([string]::IsNullOrWhiteSpace($vsPath)) {
            throw 'Visual C++ x64 build tools are unavailable on the Windows runner.'
          }

          Import-Module (Join-Path $vsPath 'Common7\Tools\Microsoft.VisualStudio.DevShell.dll')
          Enter-VsDevShell `
            -VsInstallPath $vsPath `
            -SkipAutomaticLocation `
            -DevCmdArguments '-arch=x64 -host_arch=x64'

          $sourceDirectory = Join-Path $PWD 'src\AssessmentTool.Bootstrapper'
          $buildDirectory = Join-Path $PWD 'artifacts\bootstrapper-build'
          $generatedDirectory = Join-Path $buildDirectory 'generated'
          $releaseDirectory = Join-Path $PWD 'artifacts\release\EvaluationTool'
          New-Item -ItemType Directory -Path $generatedDirectory -Force | Out-Null

          Push-Location $buildDirectory
          try {
            & cl.exe `
              /nologo /std:c++17 /utf-8 /EHsc /W4 /WX /O2 /MT `
              (Join-Path $sourceDirectory 'BootstrapDecision.cpp') `
              (Join-Path $sourceDirectory 'BootstrapDecisionTests.cpp') `
              /Fe:BootstrapDecisionTests.exe
            if ($LASTEXITCODE -ne 0) {
              throw "Native startup decision tests failed to compile with exit code $LASTEXITCODE."
            }
            & .\BootstrapDecisionTests.exe
            if ($LASTEXITCODE -ne 0) {
              throw "Native startup decision tests failed with exit code $LASTEXITCODE."
            }

            Remove-Item -Path *.obj -Force -ErrorAction SilentlyContinue
            $appPath = Join-Path $releaseDirectory 'AssessmentTool.App.exe'
            $appHash = (Get-FileHash -LiteralPath $appPath -Algorithm SHA256).Hash.ToLowerInvariant()
            @(
              '#pragma once',
              "#define ASSESSMENTTOOL_APP_SHA256 L`"$appHash`""
            ) | Set-Content `
              -LiteralPath (Join-Path $generatedDirectory 'GeneratedHashes.h') `
              -Encoding ascii

            & cl.exe `
              /nologo /std:c++17 /utf-8 /EHsc /W4 /WX /O1 /MT /DUNICODE /D_UNICODE `
              "/I$generatedDirectory" `
              (Join-Path $sourceDirectory 'BootstrapDecision.cpp') `
              (Join-Path $sourceDirectory 'main.cpp') `
              /Fe:EvaluationTool.exe `
              /link /SUBSYSTEM:WINDOWS /OPT:REF /OPT:ICF
            if ($LASTEXITCODE -ne 0) {
              throw "Native startup checker failed to compile with exit code $LASTEXITCODE."
            }
            & mt.exe -nologo `
              -manifest (Join-Path $sourceDirectory 'app.manifest') `
              '-outputresource:EvaluationTool.exe;#1'
            if ($LASTEXITCODE -ne 0) {
              throw "Native startup checker manifest embedding failed with exit code $LASTEXITCODE."
            }

            $headers = (& dumpbin.exe /headers .\EvaluationTool.exe) -join "`n"
            if ($LASTEXITCODE -ne 0 -or $headers -notmatch 'machine \(x64\)') {
              throw 'Native startup checker is not an x64 executable.'
            }
            Copy-Item `
              -LiteralPath .\EvaluationTool.exe `
              -Destination (Join-Path $releaseDirectory 'EvaluationTool.exe') `
              -Force
          }
          finally {
            Pop-Location
          }

      - name: Measure portable package size
        run: |
          $releaseDirectory = Join-Path $PWD 'artifacts\release\EvaluationTool'
          & '.\build\Measure-Package.ps1' `
            -ReleaseRoot $releaseDirectory `
            -TargetMaximumMegabytes 40
          $report = Get-Content `
            -LiteralPath (Join-Path $releaseDirectory 'package-size.json') `
            -Raw | ConvertFrom-Json
          if ($report.PackageKind -ne 'portable-windows-x64' -or
              $report.FileCount -le 0 -or
              -not $report.WithinTarget) {
            throw 'Portable package size report is incomplete or outside the target.'
          }

          @(
            '### Windows x64 绿色版体积',
            '',
            "- 总大小：$($report.TotalMegabytes) MB",
            "- 文件数：$($report.FileCount)",
            "- 目标上限：$($report.TargetMaximumMegabytes) MB",
            "- 是否达标：$($report.WithinTarget)"
          ) | Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY -Encoding UTF8

      - name: Generate and verify Release integrity manifest
        run: |
          & '.\build\Write-ReleaseManifest.ps1' `
            -ReleaseRoot (Join-Path $PWD 'artifacts\release\EvaluationTool') `
            -GitCommit '${{ github.sha }}'

      - name: Test startup checker package integrity decisions
        run: |
          $sourceDirectory = Join-Path $PWD 'artifacts\release\EvaluationTool'
          $testDirectory = Join-Path $env:RUNNER_TEMP 'EvaluationTool-Bootstrapper-Integrity'
          Remove-Item -LiteralPath $testDirectory -Recurse -Force -ErrorAction SilentlyContinue
          Copy-Item -LiteralPath $sourceDirectory -Destination $testDirectory -Recurse
          $launcher = Join-Path $testDirectory 'EvaluationTool.exe'
          $appPath = Join-Path $testDirectory 'AssessmentTool.App.exe'
          $manifestPath = Join-Path $testDirectory 'SHA256SUMS.txt'

          function Assert-DiagnosticExitCode([int] $expected, [string] $description) {
            $process = Start-Process `
              -FilePath $launcher `
              -WorkingDirectory $testDirectory `
              -ArgumentList '--diagnose-exit-code' `
              -Wait -PassThru
            if ($process.ExitCode -ne $expected) {
              throw "$description returned $($process.ExitCode); expected $expected."
            }
          }

          Assert-DiagnosticExitCode 0 'Complete package diagnostic'
          Move-Item -LiteralPath $manifestPath -Destination "$manifestPath.missing"
          Assert-DiagnosticExitCode 12 'Missing manifest diagnostic'
          Move-Item -LiteralPath "$manifestPath.missing" -Destination $manifestPath
          Add-Content -LiteralPath $appPath -Value 'tampered' -Encoding ascii
          Assert-DiagnosticExitCode 12 'Modified application diagnostic'
          Remove-Item -LiteralPath $testDirectory -Recurse -Force

      - name: Smoke test packaged application startup
        id: packaged_startup
        run: |
          $releaseDirectory = Join-Path $PWD 'artifacts\release\EvaluationTool'
          $appPath = Join-Path $releaseDirectory 'AssessmentTool.App.exe'
          $launcherPath = Join-Path $releaseDirectory 'EvaluationTool.exe'
          foreach ($requiredPath in @($appPath, $launcherPath)) {
            if (-not (Test-Path -LiteralPath $requiredPath -PathType Leaf)) {
              throw "Packaged application is missing: $requiredPath"
            }
          }

          function Test-PackagedApplicationStartup([string] $description) {
            $startedAt = Get-Date
            $markerPath = Join-Path ([System.IO.Path]::GetTempPath()) 'EvaluationTool-startup-success.json'
            Remove-Item -LiteralPath $markerPath -Force -ErrorAction SilentlyContinue
            $process = Start-Process `
              -FilePath $appPath `
              -WorkingDirectory $releaseDirectory `
              -PassThru `
              -ErrorAction Stop
            try {
              $deadline = (Get-Date).AddSeconds(15)
              $marker = $null
              while ((Get-Date) -lt $deadline) {
                $process.Refresh()
                if ($process.HasExited) {
                  throw "$description exited during startup with code $($process.ExitCode)."
                }

                if (Test-Path -LiteralPath $markerPath -PathType Leaf) {
                  try {
                    $marker = Get-Content -LiteralPath $markerPath -Raw | ConvertFrom-Json
                    if ($marker.status -eq 'main-window-displayed' -and
                        [int]$marker.processId -eq $process.Id) {
                      break
                    }
                  }
                  catch {
                    $marker = $null
                  }
                }

                Start-Sleep -Milliseconds 250
              }

              if ($null -eq $marker -or
                  $marker.status -ne 'main-window-displayed' -or
                  [int]$marker.processId -ne $process.Id) {
                Get-WinEvent -FilterHashtable @{
                  LogName = 'Application'
                  StartTime = $startedAt.AddSeconds(-1)
                } -ErrorAction SilentlyContinue |
                  Where-Object { $_.ProviderName -in @('.NET Runtime', 'Application Error', 'Windows Error Reporting') } |
                  Select-Object -First 10 TimeCreated, ProviderName, Id, LevelDisplayName, Message |
                  Format-List
                throw "$description did not report a displayed main window within 15 seconds."
              }

              Write-Host "$description displayed the main window successfully."
            }
            finally {
              $process.Refresh()
              if (-not $process.HasExited) {
                Stop-Process -Id $process.Id -Force
                if (-not $process.WaitForExit(5000)) {
                  throw "$description could not be terminated within 5 seconds."
                }
              }
              $process.Dispose()
              Remove-Item -LiteralPath $markerPath -Force -ErrorAction SilentlyContinue
            }
          }

          Test-PackagedApplicationStartup 'First packaged startup'
          Test-PackagedApplicationStartup 'Second packaged startup with existing local data'

          $markerPath = Join-Path ([System.IO.Path]::GetTempPath()) 'EvaluationTool-startup-success.json'
          Remove-Item -LiteralPath $markerPath -Force -ErrorAction SilentlyContinue
          $launcherProcess = Start-Process `
            -FilePath $launcherPath `
            -WorkingDirectory $releaseDirectory `
            -PassThru
          if (-not $launcherProcess.WaitForExit(5000)) {
            Stop-Process -Id $launcherProcess.Id -Force -ErrorAction SilentlyContinue
            throw 'Packaged startup checker did not return within 5 seconds.'
          }
          if ($launcherProcess.ExitCode -ne 0) {
            throw "Packaged startup checker exited with code $($launcherProcess.ExitCode)."
          }
          $launcherProcess.Dispose()

          $appProcess = $null
          try {
            $deadline = (Get-Date).AddSeconds(15)
            while ((Get-Date) -lt $deadline) {
              if (Test-Path -LiteralPath $markerPath -PathType Leaf) {
                try {
                  $marker = Get-Content -LiteralPath $markerPath -Raw | ConvertFrom-Json
                  if ($marker.status -eq 'main-window-displayed') {
                    $appProcess = Get-Process -Id ([int]$marker.processId) -ErrorAction SilentlyContinue
                    if ($null -ne $appProcess) {
                      break
                    }
                  }
                }
                catch {
                  $appProcess = $null
                }
              }
              Start-Sleep -Milliseconds 250
            }
            if ($null -eq $appProcess) {
              throw 'Packaged startup checker did not launch a displayed main window within 15 seconds.'
            }
          }
          finally {
            if ($null -ne $appProcess) {
              Stop-Process -Id $appProcess.Id -Force -ErrorAction SilentlyContinue
              $appProcess.Dispose()
            }
            Remove-Item -LiteralPath $markerPath -Force -ErrorAction SilentlyContinue
          }

      - name: Build per-user Windows installer
        run: |
          $isccCandidates = @(
            (Join-Path ${env:ProgramFiles(x86)} 'Inno Setup 6\ISCC.exe'),
            (Join-Path $env:ProgramFiles 'Inno Setup 6\ISCC.exe')
          )
          $isccPath = $isccCandidates |
            Where-Object { Test-Path -LiteralPath $_ -PathType Leaf } |
            Select-Object -First 1
          if ([string]::IsNullOrWhiteSpace($isccPath)) {
            $command = Get-Command ISCC.exe -ErrorAction SilentlyContinue
            if ($null -ne $command) {
              $isccPath = $command.Source
            }
          }
          if ([string]::IsNullOrWhiteSpace($isccPath)) {
            throw 'Inno Setup 6 compiler is not available on the Windows runner.'
          }

          $releaseDirectory = Join-Path $PWD 'artifacts\release\EvaluationTool'
          $installerDirectory = Join-Path $PWD 'artifacts\installer'
          New-Item -ItemType Directory -Path $installerDirectory -Force | Out-Null
          $appVersion = "0.1.${{ github.run_number }}.0"
          & $isccPath `
            "/DAppVersion=$appVersion" `
            "/DReleaseRoot=$releaseDirectory" `
            "/DOutputDir=$installerDirectory" `
            'installer\AssessmentTool.iss'
          if ($LASTEXITCODE -ne 0) {
            throw "Inno Setup compiler failed with exit code $LASTEXITCODE."
          }

          $setupPath = Join-Path $installerDirectory 'EvaluationTool-Setup-windows-x64.exe'
          if (-not (Test-Path -LiteralPath $setupPath -PathType Leaf)) {
            throw "Installer output is missing: $setupPath"
          }

      - name: Smoke test installer and data-preserving uninstall
        run: |
          $installerDirectory = Join-Path $PWD 'artifacts\installer'
          $setupPath = Join-Path $installerDirectory 'EvaluationTool-Setup-windows-x64.exe'
          $installDirectory = Join-Path $env:RUNNER_TEMP 'EvaluationTool-Installed'
          $installLog = Join-Path $env:RUNNER_TEMP 'EvaluationTool-install.log'
          $uninstallLog = Join-Path $env:RUNNER_TEMP 'EvaluationTool-uninstall.log'
          $productDataDirectory = Join-Path $env:LOCALAPPDATA 'EvaluationTool'
          $sentinelPath = Join-Path $productDataDirectory 'installer-preservation-sentinel.txt'
          Remove-Item -LiteralPath $installDirectory -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $productDataDirectory -Force | Out-Null
          Set-Content -LiteralPath $sentinelPath -Value 'preserve-on-uninstall' -Encoding UTF8

          $install = Start-Process `
            -FilePath $setupPath `
            -ArgumentList @(
              '/VERYSILENT',
              '/SUPPRESSMSGBOXES',
              '/NORESTART',
              "/DIR=$installDirectory",
              "/LOG=$installLog") `
            -Wait -PassThru
          if ($install.ExitCode -ne 0) {
            Get-Content -LiteralPath $installLog -ErrorAction SilentlyContinue
            throw "Installer smoke test failed with exit code $($install.ExitCode)."
          }

          $installedLauncher = Join-Path $installDirectory 'EvaluationTool.exe'
          $installedApp = Join-Path $installDirectory 'AssessmentTool.App.exe'
          $installedPlink = Join-Path $installDirectory '依赖组件\plink.exe'
          $uninstaller = Join-Path $installDirectory 'unins000.exe'
          foreach ($requiredPath in @($installedLauncher, $installedApp, $installedPlink, $uninstaller)) {
            if (-not (Test-Path -LiteralPath $requiredPath -PathType Leaf)) {
              throw "Installed package is missing required file: $requiredPath"
            }
          }

          $markerPath = Join-Path ([System.IO.Path]::GetTempPath()) 'EvaluationTool-startup-success.json'
          Remove-Item -LiteralPath $markerPath -Force -ErrorAction SilentlyContinue
          $launcherProcess = Start-Process `
            -FilePath $installedLauncher `
            -WorkingDirectory $installDirectory `
            -PassThru
          if (-not $launcherProcess.WaitForExit(5000)) {
            Stop-Process -Id $launcherProcess.Id -Force -ErrorAction SilentlyContinue
            throw 'Installed startup checker did not return within 5 seconds.'
          }
          if ($launcherProcess.ExitCode -ne 0) {
            throw "Installed startup checker exited with code $($launcherProcess.ExitCode)."
          }
          $launcherProcess.Dispose()
          $installedProcess = $null
          try {
            $deadline = (Get-Date).AddSeconds(15)
            $marker = $null
            while ((Get-Date) -lt $deadline) {
              if (Test-Path -LiteralPath $markerPath -PathType Leaf) {
                try {
                  $marker = Get-Content -LiteralPath $markerPath -Raw | ConvertFrom-Json
                  if ($marker.status -eq 'main-window-displayed') {
                    $installedProcess = Get-Process -Id ([int]$marker.processId) -ErrorAction SilentlyContinue
                    if ($null -ne $installedProcess) {
                      break
                    }
                  }
                }
                catch {
                  $marker = $null
                }
              }
              Start-Sleep -Milliseconds 250
            }
            if ($null -eq $installedProcess -or
                $null -eq $marker -or
                $marker.status -ne 'main-window-displayed') {
              throw 'Installed application did not display its main window within 15 seconds.'
            }
          }
          finally {
            if ($null -ne $installedProcess) {
              Stop-Process -Id $installedProcess.Id -Force -ErrorAction SilentlyContinue
              $installedProcess.Dispose()
            }
            Remove-Item -LiteralPath $markerPath -Force -ErrorAction SilentlyContinue
          }

          $uninstall = Start-Process `
            -FilePath $uninstaller `
            -ArgumentList @('/VERYSILENT', '/SUPPRESSMSGBOXES', '/NORESTART', "/LOG=$uninstallLog") `
            -Wait -PassThru
          if ($uninstall.ExitCode -ne 0) {
            Get-Content -LiteralPath $uninstallLog -ErrorAction SilentlyContinue
            throw "Uninstaller smoke test failed with exit code $($uninstall.ExitCode)."
          }
          if ((Test-Path -LiteralPath $installedLauncher -PathType Leaf) -or
              (Test-Path -LiteralPath $installedApp -PathType Leaf)) {
            throw 'Uninstaller left the installed application executable behind.'
          }
          if (-not (Test-Path -LiteralPath $sentinelPath -PathType Leaf)) {
            throw 'Uninstaller removed current-user EvaluationTool project data.'
          }
          Remove-Item -LiteralPath $sentinelPath -Force

      - name: Measure installer package size
        run: |
          $installerDirectory = Join-Path $PWD 'artifacts\installer'
          $setupPath = Join-Path $installerDirectory 'EvaluationTool-Setup-windows-x64.exe'
          $hash = (Get-FileHash -LiteralPath $setupPath -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  EvaluationTool-Setup-windows-x64.exe" |
            Set-Content -LiteralPath (Join-Path $installerDirectory 'SHA256SUMS.txt') -Encoding utf8NoBOM
          & '.\build\Measure-Package.ps1' `
            -ReleaseRoot $installerDirectory `
            -PackageKind installer-windows-x64 `
            -TargetMaximumMegabytes 60
          $report = Get-Content `
            -LiteralPath (Join-Path $installerDirectory 'package-size.json') `
            -Raw | ConvertFrom-Json
          @(
            '### Windows x64 安装版体积',
            '',
            "- 总大小：$($report.TotalMegabytes) MB",
            "- 文件数：$($report.FileCount)",
            "- 目标上限：$($report.TargetMaximumMegabytes) MB",
            "- 是否达标：$($report.WithinTarget)"
          ) | Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY -Encoding UTF8

      - name: Publish packaged startup diagnostics
        if: ${{ failure() && steps.packaged_startup.outcome == 'failure' }}
        run: |
          $diagnosticDirectory = Join-Path $PWD 'artifacts\startup-diagnostics'
          New-Item -ItemType Directory -Path $diagnosticDirectory -Force | Out-Null
          $startupLog = Join-Path ([System.IO.Path]::GetTempPath()) 'EvaluationTool-startup.log'
          if (Test-Path -LiteralPath $startupLog -PathType Leaf) {
            Copy-Item -LiteralPath $startupLog `
              -Destination (Join-Path $diagnosticDirectory 'EvaluationTool-startup.log') `
              -Force
            $detail = Get-Content -LiteralPath $startupLog -Raw
            $escaped = $detail.Replace('%', '%25').Replace("`r", '%0D').Replace("`n", '%0A')
            Write-Output "::error title=Packaged application startup failed::$escaped"
          }
          else {
            $message = 'The packaged application did not create EvaluationTool-startup.log. Inspect the Windows Application event details in the job log.'
            Set-Content `
              -LiteralPath (Join-Path $diagnosticDirectory 'startup-log-missing.txt') `
              -Value $message `
              -Encoding UTF8
            Write-Output "::error title=Packaged application startup failed::$message"
          }

      - name: Upload test results
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: EvaluationTool-test-results-windows
          path: artifacts\test-results
          if-no-files-found: warn
          retention-days: 14

      - name: Upload packaged startup diagnostics
        if: ${{ failure() && steps.packaged_startup.outcome == 'failure' }}
        uses: actions/upload-artifact@v6
        with:
          name: EvaluationTool-startup-diagnostics-windows
          path: artifacts\startup-diagnostics
          if-no-files-found: warn
          retention-days: 14

      - name: Upload copyable Release build
        uses: actions/upload-artifact@v6
        with:
          name: EvaluationTool-Release-windows-x64
          path: artifacts\release\EvaluationTool
          if-no-files-found: error
          retention-days: 14

      - name: Upload Windows installer
        uses: actions/upload-artifact@v6
        with:
          name: EvaluationTool-Installer-windows-x64
          path: artifacts\installer
          if-no-files-found: error
          retention-days: 14
